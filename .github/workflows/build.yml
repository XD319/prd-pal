name: CI and Deploy

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - "terraform/**"
  push:
    branches: [master]
    paths-ignore:
      - "terraform/**"

env:
  REPO_FULL_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install pytest pytest-cov ruff

      - name: Run backend tests with coverage
        run: pytest --cov=requirement_review_v1 --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg VITE_API_URL=http://localhost:8000 -t prdreview-ci:${{ github.sha }} .

  build-and-update:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - backend
      - frontend
      - lint
      - docker
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
    permissions:
      contents: write
      id-token: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract repository name
        id: extract_short_name_repo
        run: |
          REPO_NAME="${REPO_FULL_NAME##*/}"
          echo "Repository Short name: $REPO_NAME"
          echo "REPO_NAME=$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate image tag
        id: image-tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          IMAGE_TAG="${TIMESTAMP}-${SHORT_SHA}"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::908027381725:role/${{ steps.extract_short_name_repo.outputs.REPO_NAME }}-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build --build-arg VITE_API_URL="${{ vars.VITE_API_URL }}" -t "${{ steps.login-ecr.outputs.registry }}/${{ steps.extract_short_name_repo.outputs.REPO_NAME }}:${{ steps.image-tag.outputs.tag }}" .
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ steps.extract_short_name_repo.outputs.REPO_NAME }}:${{ steps.image-tag.outputs.tag }}"

      - name: Trigger deployment workflow
        run: |
          echo "Triggering deployment workflow with image tag: ${{ steps.image-tag.outputs.tag }}"

          if gh workflow run .github/workflows/deploy.yml \
            --ref master \
            --field image_tag="${{ steps.image-tag.outputs.tag }}"; then
            echo "Successfully triggered deployment workflow via GitHub CLI"
          else
            echo "GitHub CLI failed, trying API directly..."
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
              -d '{"ref":"master","inputs":{"image_tag":"${{ steps.image-tag.outputs.tag }}"}}'
            echo "Triggered deployment workflow via API"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create deployment summary
        run: |
          {
            echo "## Build Summary"
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image Tag | \`${{ steps.image-tag.outputs.tag }}\` |"
            echo "| ECR Repository | \`${{ steps.extract_short_name_repo.outputs.REPO_NAME }}\` |"
            echo "| Commit SHA | \`${{ steps.image-tag.outputs.short_sha }}\` |"
            echo "| Build Status | Complete |"
            echo ""
            echo "### Next Steps"
            echo "- Deployment workflow triggered with image tag: \`${{ steps.image-tag.outputs.tag }}\`"
            echo "- Monitor the Terraform Deploy workflow for completion"
            echo "- Service will be available at \`${{ steps.extract_short_name_repo.outputs.REPO_NAME }}.ggai:3535\`"
          } >> "$GITHUB_STEP_SUMMARY"
